services:
  review-service:
    build:
      context: .
    image: r-selfhosted/ai-detector-review-service:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${REVIEW_SERVICE_PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.PORT || '8080') + '/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
